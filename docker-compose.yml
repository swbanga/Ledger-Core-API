services:
  sqldb:
    image: mcr.microsoft.com/azure-sql-edge:latest
    container_name: ledger-sql
    cap_add:
      - SYS_PTRACE
    environment:
      - ACCEPT_EULA=1
      - MSSQL_SA_PASSWORD=${DB_PASSWORD} # Reads dynamically from .env
    ports:
      - "1433:1433"
    volumes:
      - sql-data:/var/opt/mssql
    restart: unless-stopped

  redis-cache:
    image: redis:7-alpine
    container_name: ledger-redis
    ports:
      - "6379:6379"
    command: redis-server --save 60 1 --loglevel warning
    volumes:
      - redis-data:/data
    restart: unless-stopped

volumes:
  sql-data:
  redis-data: